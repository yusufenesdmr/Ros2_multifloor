# hotel_nav2.yaml
# Nav2 configuration for the hotel luggage robot.
# Integrates nav2_virtual_layer (repo 1) for dynamic obstacles.
# Maps generated by SDF2MAP: resolution=0.05, occupied_thresh=0.65, free_thresh=0.25

# ─── AMCL ──────────────────────────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /rotav/scan
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only_: false

# ─── Map Server ────────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # set dynamically at launch time or via load_map service

# ─── Lifecycle Manager ─────────────────────────────────────────────────────────
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother

# ─── Controller Server ─────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.5
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0
      use_interpolation: false

# ─── Planner Server ────────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ─── Smoother Server ───────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ─── Behavior Server ───────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - assisted_teleop
      - wait
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ─── BT Navigator ──────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /rotav/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

# ─── Velocity Smoother ─────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/rotav/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ─── Global Costmap (with virtual layer) ───────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[0.30, 0.24], [0.30, -0.24], [-0.30, -0.24], [-0.30, 0.24]]"
      resolution: 0.05      # matches SDF2MAP output resolution
      track_unknown_space: true
      always_send_full_costmap: true

      plugins:
        - name: static_layer
          type: "nav2_costmap_2d::StaticLayer"
        - name: obstacle_layer
          type: "nav2_costmap_2d::ObstacleLayer"
        - name: inflation_layer
          type: "nav2_costmap_2d::InflationLayer"

      static_layer:
        map_subscribe_transient_local: true
        enabled: true

      obstacle_layer:
        enabled: true
        observation_sources: scan person_points person_scan
        scan:
          topic: /rotav/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
        person_points:
          topic: /detected_person_points
          max_obstacle_height: 2.2
          min_obstacle_height: 0.0
          clearing: false
          marking: true
          data_type: "PointCloud2"
          observation_persistence: 1.5
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          expected_update_rate: 0.0
        person_scan:
          topic: /person_obstacle_scan
          max_obstacle_height: 2.2
          clearing: false
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

# ─── Local Costmap ─────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.30, 0.24], [0.30, -0.24], [-0.30, -0.24], [-0.30, 0.24]]"
      plugins:
        - name: obstacle_layer
          type: "nav2_costmap_2d::ObstacleLayer"
        - name: inflation_layer
          type: "nav2_costmap_2d::InflationLayer"

      obstacle_layer:
        enabled: true
        observation_sources: scan person_points person_scan
        scan:
          topic: /rotav/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
        person_points:
          topic: /detected_person_points
          max_obstacle_height: 2.2
          min_obstacle_height: 0.0
          clearing: false
          marking: true
          data_type: "PointCloud2"
          observation_persistence: 1.5
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          expected_update_rate: 0.0
        person_scan:
          topic: /person_obstacle_scan
          max_obstacle_height: 2.2
          clearing: false
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
