# wormhole_navigator.yaml – Multi-floor navigator node parameters
# For hotel_luggage_robot/scripts/wormhole_navigator.py

wormhole_navigator:
  ros__parameters:
    # SQLite wormhole database (generated by seed_demo_database or custom)
    wormhole_db_path: "/path/to/hotel_wormholes.db"  # UPDATE before running

    # Starting floor on power-on
    initial_map: "floor_1"

    # Directory where SDF2MAP-generated map YAMLs are stored
    maps_base_dir: "/path/to/maps/"                  # UPDATE before running

    # TF frames
    map_frame:    "map"
    robot_frame:  "base_footprint"

    # Nav2 action
    nav2_action_name: "/navigate_to_pose"

    # Nav2 Lifecycle Map Server service
    load_map_service: "/map_server/load_map"

    # AMCL initial pose topic (for re-localisation after floor switch)
    initial_pose_topic: "/initialpose"

    # Elevator door state topic (from elevator_controller.py)
    elevator_status_topic: "/elevator_controller/door_state"

    # nav2_virtual_layer namespace (must match global_costmap config)
    virtual_layer_ns: "/global_costmap/virtual_layer"

    # Timing
    map_load_wait_sec:         2.5    # wait after LoadMap for costmaps to update
    elevator_wait_timeout_sec: 60.0   # max time to wait for elevator doors to open

    # Virtual door wall parameters
    door_wall_thickness_m: 0.15
    door_wall_cost:        254        # LETHAL – robot cannot pass until wall removed
